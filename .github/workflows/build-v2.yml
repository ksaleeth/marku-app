name: Build MarkU TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Create TWA project from manifest
        run: |
          mkdir -p twa-project
          cp twa-manifest.json twa-project/twa-manifest.json
          cd twa-project
          bubblewrap init \
            --manifest https://marku.in/superpwa-manifest.json \
            --directory . \
            --skipPwaValidation \
            --packageId in.marku.app \
            --name "MarkU Life Design Academy" \
            --launcherName "MarkU" \
            --themeColor "#0e8f84" \
            --backgroundColor "#e8f7f5" \
            --startUrl "/dashboard/" \
            --iconUrl "https://marku.in/wp-content/uploads/2026/02/Copy-of-MarkU-Logo_20260216_182756_0000.png" \
            --maskableIconUrl "https://marku.in/wp-content/uploads/2026/02/Copy-of-MarkU-Logo_20260216_182756_0000.png" \
            --appVersion "1.0.0" \
            --appVersionCode 1 \
            --signingMode none

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: marku-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
            twa-project/app-release.apk
          retention-days: 30
          if-no-files-found: warn
