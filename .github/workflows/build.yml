name: Build MarkU TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Bubblewrap to skip JDK install
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'EOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17*/x64",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Create TWA project
        run: |
          mkdir -p twa-project
          cd twa-project
          echo "no" | bubblewrap init \
            --manifest https://marku.in/superpwa-manifest.json \
            --skipPwaValidation
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Copy custom twa-manifest
        run: cp twa-manifest.json twa-project/twa-manifest.json

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: marku-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
            twa-project/app-release.apk
          retention-days: 30
          if-no-files-found: warn
