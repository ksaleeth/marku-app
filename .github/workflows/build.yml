name: Build MarkU TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Generate TWA project directly from manifest JSON
        run: |
          mkdir -p twa-project
          cp twa-manifest.json twa-project/twa-manifest.json
          cd twa-project
          bubblewrap build \
            --skipPwaValidation \
            --manifest twa-manifest.json
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: marku-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
            twa-project/app-release.apk
          retention-days: 30
          if-no-files-found: warn
