name: Build MarkU TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          bubblewrap init \
            --manifest https://marku.in/superpwa-manifest.json \
            --directory ./twa-project
        working-directory: ${{ github.workspace }}

      - name: Override twa-manifest.json with custom config
        run: cp twa-manifest.json ./twa-project/twa-manifest.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marku-app-release
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
          retention-days: 30
